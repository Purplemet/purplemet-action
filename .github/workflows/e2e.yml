# End-to-end tests validating all documented usage patterns.
# Mirrors every example from docs/integrations/github-actions.md.
# Triggered manually or on pushes to main/develop.
name: E2E Tests

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  # Dev API requires Basic Auth (nginx proxy)
  PPM_CLOUD_UI_BASIC_USER: ${{ secrets.PPM_CLOUD_UI_BASIC_USER }}
  PPM_CLOUD_UI_BASIC_PASS: ${{ secrets.PPM_CLOUD_UI_BASIC_PASS }}

jobs:
  # ── Test 1: Composite action (Quick Start) ──────────
  action-basic:
    name: "Action: basic analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          api-token: ${{ secrets.PURPLEMET_API_TOKEN }}
          target-url: 'https://www.purplemet.com'
          fail-severity: 'high'
          base-url: ${{ secrets.PURPLEMET_BASE_URL }}
        continue-on-error: true

  # ── Test 2: Action outputs ─────────────────────────
  action-outputs:
    name: "Action: outputs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        id: analysis
        with:
          api-token: ${{ secrets.PURPLEMET_API_TOKEN }}
          target-url: 'https://github.com'
          base-url: ${{ secrets.PURPLEMET_BASE_URL }}
        continue-on-error: true

      - name: Verify outputs are populated
        run: |
          echo "Rating: ${{ steps.analysis.outputs.rating }}"
          echo "Issues: ${{ steps.analysis.outputs.issues }}"
          echo "Exit code: ${{ steps.analysis.outputs.exit-code }}"

          if [ -z "${{ steps.analysis.outputs.rating }}" ]; then
            echo "::error::output 'rating' is empty"; exit 1
          fi
          if [ -z "${{ steps.analysis.outputs.issues }}" ]; then
            echo "::error::output 'issues' is empty"; exit 1
          fi
          if [ -z "${{ steps.analysis.outputs.exit-code }}" ]; then
            echo "::error::output 'exit-code' is empty"; exit 1
          fi

      - name: Verify JSON report file exists
        run: |
          if [ ! -f purplemet-report.json ]; then
            echo "::error::purplemet-report.json not generated"
            exit 1
          fi
          jq '.analysis.issueCnts' purplemet-report.json

      - name: Verify gate-results output
        run: |
          GATES='${{ steps.analysis.outputs.gate-results }}'
          if [ -z "$GATES" ] || [ "$GATES" = "{}" ]; then
            echo "::warning::gate-results is empty (may be expected)"
          else
            echo "Gate results: $GATES"
          fi

  # ── Test 3: Warning mode (non-blocking) ────────────
  action-warning-mode:
    name: "Action: warning mode"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        id: analysis
        with:
          api-token: ${{ secrets.PURPLEMET_API_TOKEN }}
          target-url: 'https://docs.github.com'
          fail-severity: 'high'
          base-url: ${{ secrets.PURPLEMET_BASE_URL }}
        continue-on-error: true

      - name: Report (should never fail the pipeline)
        if: always()
        run: |
          if [ "${{ steps.analysis.outputs.exit-code }}" = "1" ]; then
            echo "::warning::Security analysis found issues (rating: ${{ steps.analysis.outputs.rating }}, issues: ${{ steps.analysis.outputs.issues }})"
          fi
          echo "Pipeline continues regardless of analysis result"

  # ── Test 4: SARIF upload via action ─────────────────
  action-sarif:
    name: "Action: SARIF upload"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          api-token: ${{ secrets.PURPLEMET_API_TOKEN }}
          target-url: 'https://www.purplemet.com'
          sarif-upload: 'true'
          fail-severity: 'high'
          base-url: ${{ secrets.PURPLEMET_BASE_URL }}
        continue-on-error: true

  # ── Test 5: Matrix multi-site ───────────────────────
  action-matrix:
    name: "Action: matrix — ${{ matrix.site.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site:
          - { name: 'purplemet.com', url: 'https://www.purplemet.com' }
          - { name: 'github.com', url: 'https://github.com' }
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          api-token: ${{ secrets.PURPLEMET_API_TOKEN }}
          target-url: ${{ matrix.site.url }}
          fail-severity: 'high'
          base-url: ${{ secrets.PURPLEMET_BASE_URL }}
        continue-on-error: true

  # ── Test 6: Binary install (curl | sh) ──────────────
  binary-install:
    name: "Binary: install + analyze"
    runs-on: ubuntu-latest
    steps:
      - name: Install Purplemet CLI
        run: curl -sSL https://raw.githubusercontent.com/purplemet/cli/main/scripts/install.sh | sh

      - name: Run analysis
        env:
          PURPLEMET_API_TOKEN: ${{ secrets.PURPLEMET_API_TOKEN }}
          PURPLEMET_BASE_URL: ${{ secrets.PURPLEMET_BASE_URL }}
        run: purplemet-cli analyze https://www.purplemet.com --json --fail-on-severity high || true

  # ── Test 7: Binary with custom exit-code handling ───
  binary-custom:
    name: "Binary: custom handling"
    runs-on: ubuntu-latest
    steps:
      - name: Install Purplemet CLI
        run: curl -sSL https://raw.githubusercontent.com/purplemet/cli/main/scripts/install.sh | sh

      - name: Run analysis with exit-code handling
        id: analysis
        env:
          PURPLEMET_API_TOKEN: ${{ secrets.PURPLEMET_API_TOKEN }}
          PURPLEMET_BASE_URL: ${{ secrets.PURPLEMET_BASE_URL }}
        run: |
          set +e
          RESULT=$(purplemet-cli analyze https://gitlab.com \
            --json --fail-on-severity high --wait-timeout 300000 2>/dev/null)
          EXIT_CODE=$?
          set -e

          echo "exit-code=${EXIT_CODE}" >> $GITHUB_OUTPUT

          # Multiline JSON requires a delimiter for GITHUB_OUTPUT
          EOF_DELIM=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "result<<${EOF_DELIM}" >> $GITHUB_OUTPUT
          echo "${RESULT}" >> $GITHUB_OUTPUT
          echo "${EOF_DELIM}" >> $GITHUB_OUTPUT

          case $EXIT_CODE in
            0) echo "Analysis passed" ;;
            1) echo "::warning::Vulnerabilities found above threshold" ;;
            2) echo "::error::Analysis error on Purplemet side" ;;
            3) echo "::error::Analysis timed out" ;;
            4) echo "::error::Network/API error" ;;
            *) echo "::error::Unexpected error (code ${EXIT_CODE})" ;;
          esac

  # ── Test 8: SARIF manual upload ─────────────────────
  binary-sarif:
    name: "Binary: SARIF generation"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Purplemet CLI
        run: curl -sSL https://raw.githubusercontent.com/purplemet/cli/main/scripts/install.sh | sh

      - name: Run analysis with SARIF output
        env:
          PURPLEMET_API_TOKEN: ${{ secrets.PURPLEMET_API_TOKEN }}
          PURPLEMET_BASE_URL: ${{ secrets.PURPLEMET_BASE_URL }}
        run: |
          purplemet-cli analyze https://www.purplemet.com \
            --format sarif --output-file purplemet-results.sarif \
            --fail-on-severity high || true

      - name: Verify SARIF file
        run: |
          if [ ! -f purplemet-results.sarif ]; then
            echo "::error::purplemet-results.sarif not generated"
            exit 1
          fi
          jq '.runs[0].tool.driver.name' purplemet-results.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: purplemet-results.sarif
          category: purplemet
        continue-on-error: true  # May fail without GHAS on private repos

  # ── Test 9: HTML report artifact ────────────────────
  binary-html:
    name: "Binary: HTML report"
    runs-on: ubuntu-latest
    steps:
      - name: Install Purplemet CLI
        run: curl -sSL https://raw.githubusercontent.com/purplemet/cli/main/scripts/install.sh | sh

      - name: Run analysis with HTML output
        env:
          PURPLEMET_API_TOKEN: ${{ secrets.PURPLEMET_API_TOKEN }}
          PURPLEMET_BASE_URL: ${{ secrets.PURPLEMET_BASE_URL }}
        run: |
          purplemet-cli analyze https://www.npmjs.com \
            --format html --output-file report.html \
            --fail-on-severity high || true

      - name: Verify HTML report
        run: |
          if [ ! -f report.html ]; then
            echo "::error::report.html not generated"
            exit 1
          fi
          echo "HTML report size: $(wc -c < report.html) bytes"

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: report.html

  # ── Test 10: Docker run ─────────────────────────────
  docker-run:
    name: "Docker: docker run"
    runs-on: ubuntu-latest
    steps:
      - name: Run analysis via Docker
        run: |
          docker run --rm \
            -e PURPLEMET_API_TOKEN=${{ secrets.PURPLEMET_API_TOKEN }} \
            -e PURPLEMET_BASE_URL=${{ secrets.PURPLEMET_BASE_URL }} \
            -e PPM_CLOUD_UI_BASIC_USER=${{ secrets.PPM_CLOUD_UI_BASIC_USER }} \
            -e PPM_CLOUD_UI_BASIC_PASS=${{ secrets.PPM_CLOUD_UI_BASIC_PASS }} \
            ppmsupport/purplemet-cli analyze https://www.purplemet.com \
              --json --fail-on-severity high || true

  # ── Test 11: Docker-based action ────────────────────
  docker-action:
    name: "Docker: docker:// action"
    runs-on: ubuntu-latest
    steps:
      - uses: docker://ppmsupport/purplemet-cli:latest
        with:
          args: analyze https://stackoverflow.com --json --fail-on-severity high
        env:
          PURPLEMET_API_TOKEN: ${{ secrets.PURPLEMET_API_TOKEN }}
          PURPLEMET_BASE_URL: ${{ secrets.PURPLEMET_BASE_URL }}
        continue-on-error: true
