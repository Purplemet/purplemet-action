name: Test Purplemet Action

on:
  push:
    branches: [main, develop]
    paths:
      - '**'
  pull_request:
    branches: [main]
    paths:
      - '**'
  workflow_dispatch:

jobs:
  # Validate action.yml syntax and structure
  validate:
    name: Validate action.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check action.yml exists and is valid YAML
        run: |
          if [ ! -f action.yml ]; then
            echo "::error::action.yml not found"
            exit 1
          fi
          # Basic YAML validation
          python3 -c "
          import yaml, sys
          with open('action.yml') as f:
              data = yaml.safe_load(f)
          required = ['name', 'description', 'inputs', 'outputs', 'runs']
          for key in required:
              if key not in data:
                  print(f'::error::Missing required key: {key}')
                  sys.exit(1)
          print('action.yml structure is valid')
          "

      - name: Verify required inputs
        run: |
          python3 -c "
          import yaml
          with open('action.yml') as f:
              data = yaml.safe_load(f)
          inputs = data.get('inputs', {})
          # Check required inputs exist
          for name in ['api-token', 'target-url']:
              if name not in inputs:
                  print(f'::error::Missing required input: {name}')
                  exit(1)
              if not inputs[name].get('required'):
                  print(f'::error::Input {name} should be required')
                  exit(1)
          # Check optional inputs have defaults
          for name in ['fail-severity', 'timeout', 'version']:
              if name in inputs and 'default' not in inputs[name]:
                  print(f'::warning::Optional input {name} has no default')
          print('All required inputs validated')
          "

      - name: Verify outputs
        run: |
          python3 -c "
          import yaml
          with open('action.yml') as f:
              data = yaml.safe_load(f)
          outputs = data.get('outputs', {})
          for name in ['exit-code', 'rating', 'issues', 'result-json']:
              if name not in outputs:
                  print(f'::error::Missing required output: {name}')
                  exit(1)
          print('All required outputs validated')
          "

  # Validate Dockerfile
  validate-docker:
    name: Validate Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile syntax
        run: |
          if [ ! -f Dockerfile ]; then
            echo "::error::Dockerfile not found"
            exit 1
          fi
          docker build --check  2>/dev/null || \
            echo "::warning::docker build --check not supported, skipping"

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # Test the install step in isolation
  test-install:
    name: Test CLI install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4

      - name: Test install step
        shell: bash
        run: |
          # Simulate the install step from action.yml
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  ARCH=amd64 ;;
            aarch64|arm64) ARCH=arm64 ;;
          esac

          # Try to resolve latest version (will fail gracefully if no releases yet)
          VERSION=$(curl -sSf https://api.github.com/repos/purplemet/cli/releases/latest 2>/dev/null \
            | grep -o '"tag_name": "[^"]*"' | cut -d'"' -f4) || true

          if [ -z "$VERSION" ]; then
            echo "::warning::No releases found — skipping download test (expected for new repos)"
            echo "Install mechanism validated (version resolution works, no releases available yet)"
            exit 0
          fi

          FILENAME="purplemet-cli-${OS}-${ARCH}"
          URL="https://dev.purplemet.com/purplemet/integrations/cli/-/releases/${VERSION}/downloads/${FILENAME}"
          echo "Would download: ${URL}"
          echo "Install mechanism validated"

  # Integration test with real API (manual trigger only)
  test-integration:
    name: Integration test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Run Purplemet Action
        id: analyze
        uses: ./
        with:
          api-token: ${{ secrets.PURPLEMET_API_TOKEN }}
          target-url: ${{ vars.PURPLEMET_TEST_URL || 'https://example.com' }}
          fail-severity: 'info'
          timeout: '120000'
        continue-on-error: true

      - name: Verify outputs
        run: |
          echo "Exit code: ${{ steps.analyze.outputs.exit-code }}"
          echo "Rating: ${{ steps.analyze.outputs.rating }}"
          echo "Issues: ${{ steps.analyze.outputs.issues }}"

          if [ -z "${{ steps.analyze.outputs.exit-code }}" ]; then
            echo "::error::exit-code output is empty"
            exit 1
          fi
          echo "All outputs present"
